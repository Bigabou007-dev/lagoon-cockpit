version: "3.8"

services:
  cockpit-api:
    build: ./packages/api
    image: ghcr.io/lagoon-tech-systems/cockpit:latest
    container_name: lagoon_cockpit_api
    restart: unless-stopped
    env_file: ./packages/api/.env
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64M
      - /var/run:size=8M
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - cockpit-data:/app/data
      - cockpit-extensions:/app/extensions
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health | grep -q '\"status\":\"ok\"'"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      start_interval: 5s
      retries: 3

volumes:
  cockpit-data:
  cockpit-extensions:

networks:
  internal:
    driver: bridge
