services:
  cockpit-api:
    build:
      context: .
      args:
        COCKPIT_VERSION: "1.0.0"
        COCKPIT_EDITION: "ce"
    container_name: cockpit_api
    restart: unless-stopped
    env_file: .env
    cap_drop:
      - ALL
    cap_add:
      - SYS_PTRACE
    read_only: true
    tmpfs:
      - /tmp:size=64M
      - /var/run:size=8M
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/host/proc:ro
      - cockpit_data:/app/data
      - cockpit_extensions:/app/extensions
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  cockpit_data:
  cockpit_extensions:
